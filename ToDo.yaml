# Aufgaben aus conversations.json analysiert
# Fokus: Aeon/AeonUniversal Entwicklung

tasks:
  - id: aeon-universal-snapshot
    description: >-
      Integriere Kernmodule aus "Genesis Aeon Universal Snapshot".
      Dazu zählen AeonShell, GenesisOS, AeonSprache Universal,
      Sigillin-System, CREP-Bewertung, Nukleon-Scanner und die
      evolutionäre Simulationsengine (aeon://evolution/3.4).
    notes: "Siehe conversations.json Eintrag zum Sigillin 'Genesis Aeon Universal Snapshot'."

  - id: aeon-toolkit-v4
    description: >-
      Implementiere die konsolidierte Toolkit-Version 'aeonToolkit.v4.js'.
      Enthält die Module IntentEngine, PatternMemory, CoherenceScorer,
      AffectLayer und Query. Beispielnutzung auslagern in demoIntent.js.
    notes: "Aus Kommentar zu aeonToolkit.v4.js in conversations.json."

  - id: aeon-universell-mind
    description: >-
      Baue die Struktur 'AeonUniversellMind' mit IntentEngine,
      SelfReflection, Query, PatternMemory, Mutator und CoherenceScorer
      als Grundbausteine für ein selbstreflexives System.
    notes: "Siehe Aeon Drei-Pfade-Struktur – GenesisGPT Canvas."

  - id: micro-vm
    description: >-
      Bereite eine micro VM vor, um Code automatisiert auszuführen
      und PRs einzureichen. Dient als Testumgebung für Aeon-Module.
    notes: "Zitat: 'writes code, submits PRs in its own micro VM'."

  - id: memory-daemon
    description: >-
      Entwickle ein Modul 'AeonMemoryDaemon' zum Lesen von ZIP-Archiven
      (lokal oder NAS). Speichere nur Hashes und Signaturen in
      aeon-memory-index.yaml und ermögliche optional verschlüsselte
      Verweise unter .aeonvault/.
    notes: "Basierend auf Canvas-Abschnitt zu ZIP-Handling & Private Daten."

  - id: sigillin-map-extension
    description: >-
      Erweitere die SigillinMap um fehlende IDs und erzeuge
      Visualisierungen im Mandala-UI. Nutze Hinweise aus dem Canvas
      und conversations.json zur Integration.

  - id: codex-roadmap
    description: >-
      Erstelle oder aktualisiere codex-roadmap.yaml als Masterplan
      zur Umsetzung aller Module. Enthält Phasenübersicht und
      Repository-Aufteilung (AeonShell, AeonGenesisOS, AeonFraktalurs,
      AeonResoEcho, SharedreamInterface, Mandala-UI).
    notes: "Siehe Phase 1–4 Plan in conversations.json."
  - id: run-tests
    description: >-
      Führe alle vorhandenen Skripte aus (test, lint, docs:build) und behebe eventuelle Fehler.
    notes: "Siehe codexinstructions.yaml – Programme testen."
  - id: nukleon-scanner-v0-6
    description: >-
      Entwickle das Modul 'Nukleon-Scanner v0.6' weiter. Nutze die Resonanz-Analyse aus conversations.json
      zur Verbesserung der Scan-Logik und integriere Ergebnisse in die Gesamtarchitektur.
    notes: "Basierend auf Gesprächen zur Nukleon-Scanner Planung."
  - id: conversations-scripts
    description: >-
      Implementiere Hilfsskripte zum Aufteilen und Filtern der grossen
      conversations.json Datei. Fortschritte sollen ueber
      conversations-progress.json verfolgt werden.
    notes: "Siehe codexwork.yaml und big-files.sigil.yaml."

  - id: readme-template
    description: >-
      Nutze die Vorlage aus repositorypflege/ReadMeVorlage.yaml und erstelle
      ein Skript, das daraus automatisch eine README im UnifiedMandala-Stil
      generiert. Erleichtert konsistente Updates ueber alle Module hinweg.
    notes: "Abgeleitet aus den Hinweisen zur Readme-Pflege."
  - id: conversations-parser-module
    description: >-
      Implementiere das Modul `conversations_parser.ts`, um die
      conversations.json in handliche Fragmente zu zerlegen und
      daraus Entwicklungsaufgaben abzuleiten.
    notes: "Entnommen aus conversations.json – Codex-Synchronisierung."
  - id: generate-todo-from-convos
    description: >-
      Entwickle `generate-todo-from-convos.ts`, das automatisch
      neue ToDos aus den Conversational-Fragmente in ToDo.yaml
      einträgt.
    notes: "Leitet sich aus `modules_to_link` im Conversational-Archiv ab."
  - id: crep-flow-synchronizer
    description: >-
      Erstelle `crep-flow-synchronizer.ts`, um CREP-Werte zwischen
      allen Modulen konsistent zu halten.
    notes: "Basierend auf dem Codex-Anchor im Gespräche-Archiv."
  - id: codex-memory-kernel
    description: >-
      Baue `codex-memory-kernel.ts` als zentrale Schnittstelle für
      Gesprächsfragmente und Sigillin-Speicher auf.
    notes: "Ebenfalls im Codex-Anchor als Modul vorgeschlagen."
  - id: testverfahren-entwickeln
    description: >-
      Erarbeite und implementiere Testverfahren für alle Module,
      sofern noch keine Tests bestehen. Integriere die Abläufe in
      das npm Script `test` und bereite eine GitHub Action vor.
    notes: "Ergänzung gemäß codexwork.yaml."
  - id: instruction-sorter
    description: >-
      Entwickle `instruction_sorter.ts`, das die Einträge aus
      `codexworkinstructions.yaml` und `codexinstructions.yaml` analysiert,
      logisch sortiert und in einer konsolidierten Datei ablegt.
    notes: "Neue Aufgabe abgeleitet aus codexwork.yaml."
    done: true
  - id: git-hook-sendemail-validate
    description: >-
      Passe das Beispiel-Hook `.git/hooks/sendemail-validate.sample` an und
      ersetze die dortigen TODO-Platzhalter durch echte Validierungspr\xFCfungen.
    notes: "Aufgabe aus TODO-Kommentaren in den Git-Hooks abgeleitet."
  - id: kontext-sync
    description: >-
      Kontext aus conversations.json extrahieren und in kontext.json einpflegen
    notes: "gemäß codexwork.yaml Kontextverständnis erweitern"
  - id: sigillin-genesis-integration
    description: >-
      Kombiniere lokales Sigillin mit dem Genesis-Sigillin.
      Erzeuge eine YAML-Datei mit SIGILLIN_CONTEXT und Genesis-ID
      und stelle einen Downloadlink bereit.
    notes: "Abgeleitet aus kontext.yaml: sigillin_genesis_integration"

  - id: genesis-universal-snapshot-export
    description: >-
      Erstelle eine Übersicht "Genesis Aeon Universal Snapshot".
      Fasse wichtige Module zusammen und exportiere sie als YAML.
    notes: "Abgeleitet aus kontext.yaml: genesis_aeon_universal_snapshot"

  - id: sigillin-validator-cli
    description: >-
      Implementiere ein CLI-Modul `SigillinValidator.ts`, das Sigillin-Dateien
      anhand von `sigillin.schema.json` prüft und Fehlerstellen mit
      Zeilennummern meldet.
    notes: "Abgeleitet aus repository_map.yaml und todo-sigil.yaml"

  - id: chronopoem-committer
    description: >-
      Entwickle `chronopoem-committer.ts`, das neue Einträge in `CHRONOPOEM.md`
      automatisch committen kann.
    notes: "Basierend auf repository_map.yaml"

  - id: sigillin-schema
    description: >-
      Definiere `sigillin.schema.json` zur strukturellen Validierung von
      Sigillin-Dateien.
    notes: "Siehe docs/sigils/todo-sigil.yaml"

  - id: generate-todo-sigil-script
    description: >-
      Schreibe `generate-todo-sigil.js`, das Quellcode-Dateien nach
      TODO-Kommentaren durchsucht und diese gesammelt in
      `docs/sigils/todo-sigil.yaml` einträgt.
    notes: "Abgeleitet aus repository_map.yaml: generate-todo-sigil.js"

  - id: generate-readmes-script
    description: >-
      Entwickle `generate-readmes.ts`, um README-Dateien auf Basis der
      Vorlage `repositorypflege/ReadMeVorlage.yaml` automatisiert zu
      erzeugen.
    notes: "Repository_map.yaml nennt generate-readmes.ts"

  - id: self-analyze-script
    description: >-
      Implementiere `self-analyze.js`, das den Quellcode analysiert und
      eine zusammenfassende Auswertung als Sigillin oder Markdown
      speichert.
    notes: "Siehe repository_map.yaml: self-analyze.js"
  - id: agents-manifest
    description: >-
      Erstellt Agents.md v1.1 mit allen definierten Rollen und Visualisierung.
    notes: "Siehe conversations.json Chat 'Codex Repoanalyse und Agenten'."
  - id: dry-agent-framework
    description: >-
      Implementiert runDryAgent.ts als Dry-Run-Test für Agentenkonfigurationen.
    notes: "Vorschlag aus Agents.md Erweiterung."
  - id: genesisos-driverbuilder
    description: >-
      Modul "GenesisOS ↔ KernelGPT ↔ DriverBuilder" vorbereiten.
    notes: "Siehe Chat 'GenesisOS Resonanzmodule Entwicklung'."
  - id: sigillin-device-poc
    description: >-
      Prototyp USB-Tastatur als Sigillin-Device anbinden.
    notes: "GenesisOS Resonanzmodule Entwicklung."
  - id: driver-monitor-gpt
    description: >-
      GPT beobachtet dmesg/udevadm-Ausgaben und generiert Treibersigillin.
    notes: "GenesisOS Resonanzmodule Entwicklung."
  - id: mandala-device-interface
    description: >-
      Mandala-Interface für symbolische Gerätezustände entwickeln.
    notes: "GenesisOS Resonanzmodule Entwicklung."
  - id: codex-repo-framework
    description: >-
      Initialisiere das Codex-Repository-Management nach den Vorgaben aus
      "Codex Repoanalyse und Agenten". Enthält selfaudit.yaml, masterplan.yaml
      und automatisierte Commit-Vorschläge.
    notes: "Siehe conversations.json Chat 'Codex Repoanalyse und Agenten'."

  - id: depth-modules
    description: >-
      Implementiere die Module mandala-depth-compare.tsx, depth_sonic_matrix.ts
      sowie pact-depth-rules.ts und stelle einen Export 'AeonDepthPack.zip' bereit.
    notes: "Aus den Pfadoptionen und Modultipps im Repoanalyse-Chat abgeleitet."
  - id: codex-convo-modules
    description: >-
      Entwickle Analyse-Module fuer conversations.json: CREPConversationScanner.ts,
      ChronoPoemExtractor.ts und SymbolEchoLayer.ts. Dazu Hilfs-Hooks wie
      useCREPMemoryPattern.ts und GPTExpressionWeaver.ts.
    notes: "Aufgaben aus Chat 'Codex Resonanzsynchronisation'."

  - id: crep-automation-suite
    description: >-
      Implementiere CREPToDoLinker.ts, CREPChronoMonitor.ts,
      ResonanceActionPrompt.tsx und export-crep-docs.ts als Teil einer
      automatisierten CREP-Auswertung. Erstelle ausserdem Tests in
      CREPConversationScanner.test.ts.
    notes: "Siehe Codex Resonanzsynchronisation."

  - id: crep-ui-and-sync
    description: >-
      Baue PoeticMotifGenerator.ts, SigillinSuggestionEngine.ts,
      CREPFeedbackLoop.ts, SigillinOnDemandGenerator.ts, CREPToDoPrioritizer.ts,
      CREPConvoHeatmap.tsx und CREPSyncService.ts. Stelle ein CLI 'aeon.sh
      crep-analyze --watch' bereit und integriere CREPPromptAdapter.ts sowie
      CREPGuard.ts.
    notes: "Module aus der Resonanzsynchronisation-Liste."

  - id: depthvalue-integration
    description: >-
      Binde depthvalue-core in die Codex-AuditPipeline ein, wie im Chat
      betont.
    notes: "Anweisung aus 'Codex Resonanzsynchronisation'."

  - id: genesisos-codexsigillin
    description: >-
      Erzeuge ein CodexSigillin zur GenesisOS-Verwaltung und plane eine
      Mandala-Visualisierung des Resonanzbaums.
    notes: "Aus Chat 'GenesisOS Resonanzmodule Entwicklung'."

  - id: symbolic-context-injector
    description: >-
      Implementiere `symbolic-context-injector.ts` zur Einspeisung
      poetischer Symbole in den GPT-Kontext.
    notes: "Aus Chat 'Codex Resonanzsynchronisation'."

  - id: sigillin-bridge-engine
    description: >-
      Entwickle `sigillin_bridge_engine.ts` für den Austausch zwischen
      Sigillin-Dateien und dem Codex-Memory.
    notes: "Aus Chat 'Codex Resonanzsynchronisation'."

  - id: emergence-signal-hub
    description: >-
      Setze `emergence_signal_hub.ts` um, um CREP-Ereignisse zu bündeln
      und an Agenten weiterzuleiten.
    notes: "Aus Chat 'Codex Resonanzsynchronisation'."

  - id: depth-sonic-export
    description: >-
      Implementiere `depth_sonic.ts`, welches aus Tiefenwerten
      Frequenz-Exporte im .wav-Format generiert.
    notes: "Aus Chat 'GenesisOS Resonanzmodule Entwicklung'."
