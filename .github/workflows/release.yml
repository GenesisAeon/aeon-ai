name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  # ------------------------------------------------------------------
  # Quality gate: tests + coverage + linting
  # ------------------------------------------------------------------
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Run tests with coverage (>99% required)
        run: |
          uv run pytest \
            --cov=aeon_ai \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=99

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          flags: unittests
          name: aeon-ai-coverage

  # ------------------------------------------------------------------
  # Build distribution artifacts
  # ------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build wheel and sdist
        run: uv build

      - name: Verify build artifacts
        run: |
          ls -lh dist/
          python -c "import zipfile, glob; [zipfile.ZipFile(f).testzip() for f in glob.glob('dist/*.whl')]"

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ------------------------------------------------------------------
  # Publish to PyPI (Trusted Publisher — OIDC)
  # ------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/aeon-ai/

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------
  # GitHub Release with auto-generated changelog
  # ------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "aeon-ai ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
          body: |
            ## aeon-ai ${{ github.ref_name }}

            **DOI:** https://doi.org/10.5281/zenodo.19132293

            ### What's New in v0.2.0

            - **`PhaseDetector`** — Real-time phase-transition detection with UTAC-Logistic
              trigger, collapse detection, and `FORWARD / COLLAPSE / UTAC_TRIGGER / FORCED`
              event classification.
            - **`SelfReflector`** — Native AeonAI closed-loop self-reflection engine:
              max 7 iterations, convergence check, CREP–Lagrangian–Sigillin coupling.
            - **CLI**: `aeon reflect --loop --phases` and `aeon detect-phase --entropy FLOAT`
            - **Orchestrator v0.2.0**: now includes `phase_events` in `OrchestratorResult`
            - **333 tests, 99.4% coverage**

            ### Install

            ```bash
            pip install aeon-ai==0.2.0
            pip install 'aeon-ai[stack]==0.2.0'
            ```

            ### Citation

            ```bibtex
            @software{aeon_ai_2026,
              author  = {GenesisAeon},
              title   = {aeon-ai: Real-time phase-transition detection and native self-reflection loop},
              version = {${{ steps.version.outputs.VERSION }}},
              year    = {2026},
              doi     = {10.5281/zenodo.19132293},
              url     = {https://github.com/GenesisAeon/aeon-ai}
            }
            ```

  # ------------------------------------------------------------------
  # Zenodo upload trigger (via GitHub Release webhook — automatic)
  # ------------------------------------------------------------------
  zenodo-check:
    name: Zenodo Integration Check
    runs-on: ubuntu-latest
    needs: github-release

    steps:
      - uses: actions/checkout@v4

      - name: Verify .zenodo.json is present and valid
        run: |
          python -c "
          import json, sys
          with open('.zenodo.json') as f:
              meta = json.load(f)
          assert 'version' in meta, 'version field missing'
          assert 'doi' in meta, 'doi field missing'
          assert 'creators' in meta, 'creators field missing'
          print(f'Zenodo metadata OK: version={meta[\"version\"]}, doi={meta[\"doi\"]}')
          "

      - name: Check version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ZENODO_VERSION=$(python -c "import json; print(json.load(open('.zenodo.json'))['version'])")
          PYPROJECT_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")

          echo "Tag version:      $TAG_VERSION"
          echo "Zenodo version:   $ZENODO_VERSION"
          echo "pyproject version: $PYPROJECT_VERSION"

          [ "$TAG_VERSION" = "$ZENODO_VERSION" ] || { echo "Version mismatch: tag vs zenodo"; exit 1; }
          [ "$TAG_VERSION" = "$PYPROJECT_VERSION" ] || { echo "Version mismatch: tag vs pyproject"; exit 1; }

          echo "All version checks passed."
